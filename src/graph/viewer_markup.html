<div class="topbar">
  <div class="graph-switcher">
    <button
      id="graph-switcher-button"
      class="graph-switcher-button"
      type="button"
      aria-haspopup="menu"
      aria-expanded="false"
      aria-controls="graph-switcher-menu"
    >
      <span id="graph-switcher-label">MB</span>
      <span class="graph-switcher-caret" aria-hidden="true"></span>
    </button>
    <div id="graph-switcher-menu" class="graph-switcher-menu hidden" role="menu" aria-label="Select graph">
      <button class="graph-switcher-option" data-graph-key="mb" type="button" role="menuitem">MB</button>
      <button class="graph-switcher-option" data-graph-key="iums" type="button" role="menuitem">IUMS</button>
      <button class="graph-switcher-option" data-graph-key="sevenspikes" type="button" role="menuitem">Seven Spikes</button>
      <button class="graph-switcher-option" data-graph-key="expanded-mb-names" type="button" role="menuitem">Expanded MB Names</button>
    </div>
  </div>
  <div class="stats" id="stats">{node_count} nodes, {edge_count} edges</div>
  <div class="compare-summary hidden" id="compare-summary">
    <span class="compare-summary-label" id="compare-summary-label"></span>
    <button class="compare-summary-clear" id="compare-clear" type="button">Clear added trees</button>
  </div>
  <div class="search-box">
    <input id="search" type="search" placeholder="Search and focus..." autocomplete="off" />
  </div>
  <div class="mode-switch" aria-label="Choose workspace">
    <button id="mode-viewer" class="mode-switch-button active" type="button" data-mode="viewer">Viewer</button>
    <button id="mode-builder" class="mode-switch-button" type="button" data-mode="builder">Builder</button>
  </div>
</div>
<div class="legend compact-legend" id="compact-legend"></div>
<button class="sidebar-handle open" id="toggle-sidebar" type="button" aria-label="Hide tools sidebar" title="Hide tools sidebar">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6l6 6"></path></svg>
</button>
<aside class="viewer-sidebar open" id="viewer-sidebar">
  <div class="sidebar-header">
    <h2>Tools</h2>
  </div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="legend" type="button">Filter</button>
    <button class="sidebar-tab" data-tab="map" type="button">Map</button>
    <button class="sidebar-tab" data-tab="ranked" type="button">Ranked</button>
  </div>
  <div class="sidebar-body">
    <div class="sidebar-pane active" data-pane="legend">
      <div class="sidebar-section">
        <div class="legend" id="legend"></div>
        <label class="sidebar-meta-toggle" title="Show only indirect paths">
          <span>Indirect only</span>
          <input id="indirect-only" type="checkbox" />
        </label>
        <label class="sidebar-meta-toggle" title="Show sanctioned individuals and their immediate context">
          <span>Sanctioned only</span>
          <input id="sanctioned-only" type="checkbox" />
        </label>
        <label class="sidebar-meta-toggle" title="Show negative news hits and their immediate context">
          <span>Negative news only</span>
          <input id="negative-news-only" type="checkbox" />
        </label>
      </div>
    </div>
    <div class="sidebar-pane" data-pane="map">
      <div class="sidebar-section map-section">
        <div id="address-map"></div>
      </div>
    </div>
    <div class="sidebar-pane" data-pane="ranked">
      <div class="score-panel" id="score-panel"></div>
    </div>
  </div>
</aside>
<main class="builder-panel hidden" id="builder-panel" aria-live="polite">
  <section class="builder-card">
    <div class="builder-card-header">
      <div>
        <p class="builder-kicker">Tree Builder</p>
        <h1>Generate a graph</h1>
      </div>
    </div>
    <form id="builder-form" class="builder-form">
      <label>
        <span>Build mode</span>
        <select id="builder-mode">
          <option value="name_seed">Normal seed</option>
          <option value="org_rooted">Start from organisations</option>
          <option value="org_chained">Seeds with organisations</option>
        </select>
      </label>
      <label>
        <span>Seed name</span>
        <input id="builder-seed-name" type="text" placeholder="e.g. Alice Example" autocomplete="off" />
      </label>
      <label>
        <span>Seed names, one per line</span>
        <textarea id="builder-seed-names" rows="4" placeholder="Use for organisation-chained builds"></textarea>
      </label>
      <label>
        <span>Organisation roots, one per line</span>
        <textarea id="builder-roots" rows="4" placeholder="charity:1095626&#10;company:01234567[:suffix]"></textarea>
      </label>
      <label>
        <span>Target names, one per line</span>
        <textarea id="builder-target-names" rows="3" placeholder="Optional aliases for org-rooted builds"></textarea>
      </label>
      <div class="builder-grid">
        <label>
          <span>Graph key</span>
          <input id="builder-graph-id" type="text" placeholder="Leave blank to use the seed name" autocomplete="off" />
        </label>
        <label>
          <span>Graph title</span>
          <input id="builder-graph-title" type="text" placeholder="Optional display title" autocomplete="off" />
        </label>
      </div>
      <div class="builder-grid">
        <label>
          <span>Save mode</span>
          <select id="builder-save-mode">
            <option value="new_version">Save as new version</option>
            <option value="overwrite_version">Overwrite version</option>
          </select>
        </label>
        <label>
          <span>Version</span>
          <input id="builder-graph-version" type="number" min="1" placeholder="Auto" readonly />
        </label>
      </div>
      <div class="builder-grid">
        <label>
          <span>Notify email</span>
          <input id="builder-notify-email" type="email" placeholder="you@example.com" autocomplete="email" />
        </label>
      </div>
      <input id="builder-limit" type="hidden" value="30" />
      <div class="builder-actions">
        <button class="builder-submit" type="submit">Generate graph</button>
      </div>
    </form>
    <div class="builder-status" id="builder-status">Ready.</div>
  </section>
  <section class="builder-card builder-graphs-card">
    <div class="builder-card-header">
      <div>
        <p class="builder-kicker">Generated Graphs</p>
        <h1>Saved graphs</h1>
      </div>
      <button id="builder-refresh-graphs" class="toolbar-btn" type="button">Refresh</button>
    </div>
    <div class="builder-graph-list" id="builder-graph-list">No generated graphs loaded yet.</div>
  </section>
</main>
<div id="graph"></div>
<div class="canvas-search-popover hidden" id="canvas-search-popover" aria-live="polite">
  <div class="canvas-search-title" id="canvas-search-title">Add tree</div>
  <input id="canvas-search-input" type="search" placeholder="Search for a node to add..." autocomplete="off" />
  <div class="canvas-search-results" id="canvas-search-results"></div>
</div>
<div class="tooltip" id="tooltip"></div>
<div class="context-menu" id="context-menu"></div>
<div class="modal-backdrop modal-left" id="details-modal" aria-hidden="true">
  <div class="modal-card details-modal-card" role="dialog" aria-modal="true" aria-labelledby="details-modal-title">
    <div class="modal-header">
      <h2 id="details-modal-title">Details</h2>
      <button class="modal-close" id="details-modal-close" type="button">Close</button>
    </div>
    <div class="modal-status" id="details-modal-status"></div>
    <div class="analysis-body" id="details-modal-body"></div>
  </div>
</div>
