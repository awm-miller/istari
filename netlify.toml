[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/mb/"
  status = 302

[[redirects]]
  from = "/mb"
  to = "/mb/"
  status = 301

[[redirects]]
  from = "/iran"
  to = "/iran/"
  status = 301

[[redirects]]
  from = "/iums"
  to = "/iums/"
  status = 301

[[redirects]]
  from = "/sevenspikes"
  to = "/sevenspikes/"
  status = 301

[[redirects]]
  from = "/expanded-mb-names"
  to = "/expanded-mb-names/"
