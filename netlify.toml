[[redirects]]
  from = "/api/*"
  to = "https://165.232.35.81.sslip.io/api/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "https://165.232.35.81.sslip.io/health"
  status = 200

[[redirects]]
  from = "/generated-graphs/*"
  to = "https://165.232.35.81.sslip.io/generated-graphs/:splat"
  status = 200
