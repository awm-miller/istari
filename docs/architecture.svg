<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1180" width="1280" height="1180"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1280" height="1180" fill="url(#bg)"/>

  <text x="60" y="70" font-size="30" font-weight="700" fill="#0F172A">Project Istari Architecture</text>
  <text x="60" y="100" font-size="15" fill="#475569">What the code does today: per-seed discovery, recursive expansion, screening, graph rebuild, and post-processing.</text>

  <rect x="60" y="135" width="560" height="620" rx="18" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="90" y="175" font-size="22" font-weight="700" fill="#1D4ED8">1. Per-seed discovery run</text>
  <text x="90" y="200" font-size="14" fill="#475569">This is the pipeline behind `run-name` and `run-seeds`.</text>

  <rect x="100" y="235" width="480" height="72" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="125" y="262" font-size="17" font-weight="700" fill="#0F172A">Start with one seed name</text>
  <text x="125" y="286" font-size="14" fill="#475569">Generate spelling variants, then search Charity Commission and Companies House for possible matches.</text>

  <rect x="100" y="340" width="480" height="72" rx="12" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="125" y="367" font-size="17" font-weight="700" fill="#0F172A">Resolve which hits are really the same person</text>
  <text x="125" y="391" font-size="14" fill="#475569">Rules handle the easy cases. AI is used only when a candidate match is still ambiguous.</text>

  <rect x="100" y="445" width="480" height="110" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="125" y="472" font-size="17" font-weight="700" fill="#0F172A">Build the organisation pool</text>
  <text x="125" y="496" font-size="14" fill="#475569">Every matched organisation can grow the pool in four ways:</text>
  <text x="145" y="520" font-size="14" fill="#475569">- linked charities from Charity Commission</text>
  <text x="145" y="542" font-size="14" fill="#475569">- same-name charity and company counterparts</text>
  <text x="145" y="564" font-size="14" fill="#475569">- shared address pivots</text>
  <text x="145" y="586" font-size="14" fill="#475569">- organisations mentioned in PDFs and filings</text>

  <rect x="100" y="590" width="480" height="72" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="125" y="617" font-size="17" font-weight="700" fill="#0F172A">Expand people from those organisations</text>
  <text x="125" y="641" font-size="14" fill="#475569">Pull trustees for charities and officers for companies, then resolve them into person records.</text>

  <rect x="100" y="695" width="480" height="72" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="125" y="722" font-size="17" font-weight="700" fill="#0F172A">Feed newly found people back into search</text>
  <text x="125" y="746" font-size="14" fill="#475569">New trustees and officers are searched too. If they match new organisations, those organisations join the run.</text>

  <line x1="340" y1="307" x2="340" y2="340" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="412" x2="340" y2="445" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="555" x2="340" y2="590" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="662" x2="340" y2="695" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M 585 730 C 650 730, 650 500, 585 500" fill="none" stroke="#64748B" stroke-width="2.2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <text x="655" y="610" font-size="14" fill="#475569">Repeat until no new organisations or people are being added, or the round cap is reached.</text>

  <rect x="680" y="135" width="540" height="295" rx="18" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="710" y="175" font-size="22" font-weight="700" fill="#6D28D9">2. Rank and screen each run</text>
  <text x="710" y="200" font-size="14" fill="#475569">Once the discovery loop settles, the run moves into scoring and watchlist checks.</text>

  <rect x="720" y="235" width="460" height="72" rx="12" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>
  <text x="745" y="262" font-size="17" font-weight="700" fill="#0F172A">Rank people by connection strength</text>
  <text x="745" y="286" font-size="14" fill="#475569">People are ranked by how many scoped organisations they connect to and how strong those links are.</text>

  <rect x="720" y="340" width="460" height="72" rx="12" fill="#FFFFFF" stroke="#FECACA" stroke-width="2"/>
  <text x="745" y="367" font-size="17" font-weight="700" fill="#0F172A">Run sanctions screening</text>
  <text x="745" y="391" font-size="14" fill="#475569">The ranked people are checked against local sanctions data and cached for reuse later.</text>

  <line x1="950" y1="307" x2="950" y2="340" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="60" y="790" width="1160" height="230" rx="18" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="90" y="830" font-size="22" font-weight="700" fill="#92400E">3. Rebuild the combined graph from the latest run for each seed</text>
  <text x="90" y="855" font-size="14" fill="#78350F">This is the separate rebuild stage that produces the viewer outputs.</text>

  <rect x="90" y="885" width="250" height="95" rx="12" fill="#FFFFFF" stroke="#FCD34D" stroke-width="2"/>
  <text x="112" y="915" font-size="17" font-weight="700" fill="#0F172A">Merge runs together</text>
  <text x="112" y="939" font-size="14" fill="#475569">Take the latest run for each seed, then merge duplicate people, organisations, and addresses into one graph.</text>

  <rect x="365" y="885" width="250" height="95" rx="12" fill="#FFFFFF" stroke="#FCD34D" stroke-width="2"/>
  <text x="387" y="915" font-size="17" font-weight="700" fill="#0F172A">Refresh and reuse sanctions</text>
  <text x="387" y="939" font-size="14" fill="#475569">Reuse cached sanctions where possible, and only re-screen people whose stored screening is stale.</text>

  <rect x="640" y="885" width="250" height="95" rx="12" fill="#FFFFFF" stroke="#FCD34D" stroke-width="2"/>
  <text x="662" y="915" font-size="17" font-weight="700" fill="#0F172A">Attach Egypt judgments</text>
  <text x="662" y="939" font-size="14" fill="#475569">Match names and aliases against the curated Egypt judgments dataset and add those hits to the graph.</text>

  <rect x="915" y="885" width="275" height="95" rx="12" fill="#FFFFFF" stroke="#FCD34D" stroke-width="2"/>
  <text x="937" y="915" font-size="17" font-weight="700" fill="#0F172A">Attach adverse media and overlay data</text>
  <text x="937" y="939" font-size="14" fill="#475569">Add negative-news hits from the separate SQLite store, then build the optional low-confidence review overlay.</text>

  <line x1="340" y1="932" x2="365" y2="932" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="615" y1="932" x2="640" y2="932" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="890" y1="932" x2="915" y2="932" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="60" y="1050" width="1160" height="95" rx="18" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <text x="90" y="1090" font-size="22" font-weight="700" fill="#065F46">4. Outputs</text>
  <text x="90" y="1115" font-size="14" fill="#047857">The rebuild writes HTML, graph JSON, low-confidence overlay JSON, and address coordinate JSON for the viewer.</text>
  <text x="90" y="1138" font-size="14" fill="#047857">Negative news is not part of the discovery search itself. It is a separate screening pass that gets attached after the graph is rebuilt.</text>

  <line x1="620" y1="375" x2="720" y2="375" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M 950 430 L 950 835" fill="none" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)"/>
</svg>
